<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scout -- AI Mission Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* -- HUD overlay -- */
    #hud {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 100;
    }

    /* Top status bar */
    #status-bar {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 20, 40, 0.85);
      border: 1px solid #00c8f0;
      border-radius: 8px;
      padding: 10px 24px;
      text-align: center;
      min-width: 320px;
      pointer-events: none;
    }

    #status-title {
      font-size: 18px;
      font-weight: bold;
      color: #00c8f0;
      letter-spacing: 4px;
    }

    #status-text {
      font-size: 12px;
      color: #aaa;
      margin-top: 4px;
    }

    #threat-badge {
      display: inline-block;
      margin-top: 6px;
      padding: 2px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 2px;
      background: #003322;
      color: #00ff88;
      border: 1px solid #00ff88;
    }

    /* Bottom mission panel */
    #mission-panel {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 10, 30, 0.92);
      border: 1px solid #00c8f0;
      border-radius: 12px;
      padding: 16px 20px;
      width: 480px;
      max-width: 90vw;
      pointer-events: all;
    }

    #mission-label {
      font-size: 10px;
      color: #00c8f0;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }

    #mission-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #mission-input {
      flex: 1;
      background: rgba(0, 30, 60, 0.8);
      border: 1px solid #334;
      border-radius: 6px;
      padding: 10px 14px;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    #mission-input:focus {
      border-color: #00c8f0;
    }

    #btn-scout {
      background: #00c8f0;
      color: #000;
      border: none;
      border-radius: 6px;
      padding: 10px 18px;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    #btn-scout:hover { background: #00aed4; }
    #btn-scout:disabled { background: #334; color: #666; cursor: not-allowed; }

    #btn-voice {
      background: transparent;
      border: 1px solid #00c8f0;
      color: #00c8f0;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
    }

    #btn-voice:hover { background: rgba(0,200,240,0.1); }
    #btn-voice.listening {
      background: rgba(255,50,50,0.2);
      border-color: #ff3333;
      color: #ff3333;
      animation: pulse-border 1s infinite;
    }

    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,50,50,0.4); }
      50% { box-shadow: 0 0 0 6px rgba(255,50,50,0); }
    }

    /* World selector */
    #world-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .world-btn {
      flex: 1;
      background: rgba(0,30,60,0.8);
      border: 1px solid #334;
      border-radius: 6px;
      padding: 7px 4px;
      color: #aaa;
      font-size: 10px;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    .world-btn:hover, .world-btn.active {
      border-color: #00c8f0;
      color: #00c8f0;
      background: rgba(0,200,240,0.08);
    }

    /* Narration box */
    #narration-box {
      position: absolute;
      top: 90px;
      left: 20px;
      max-width: 340px;
      background: rgba(0,10,30,0.88);
      border-left: 3px solid #00c8f0;
      border-radius: 0 8px 8px 0;
      padding: 12px 16px;
      font-size: 13px;
      line-height: 1.6;
      color: #ddd;
      display: none;
    }

    #narration-label {
      font-size: 9px;
      color: #00c8f0;
      letter-spacing: 3px;
      margin-bottom: 6px;
    }

    /* Waypoint list */
    #waypoint-list {
      position: absolute;
      top: 90px;
      right: 20px;
      width: 220px;
      display: none;
    }

    .wp-item {
      background: rgba(0,10,30,0.88);
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 6px;
      border-left: 3px solid #666;
      font-size: 11px;
    }

    .wp-item.high   { border-left-color: #ff3333; }
    .wp-item.medium { border-left-color: #ff8800; }
    .wp-item.low    { border-left-color: #00ff88; }

    .wp-label { font-weight: bold; color: #fff; margin-bottom: 2px; }
    .wp-note  { color: #888; font-size: 10px; }

    /* Enter VR button */
    #btn-xr {
      position: absolute;
      bottom: 30px;
      right: 20px;
      background: rgba(0,200,240,0.15);
      border: 1px solid #00c8f0;
      color: #00c8f0;
      border-radius: 8px;
      padding: 10px 18px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 2px;
      cursor: pointer;
      pointer-events: all;
      display: none;
    }

    #btn-xr:hover { background: rgba(0,200,240,0.25); }

    /* Loading spinner */
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      display: none;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #113;
      border-top-color: #00c8f0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <!-- Status bar -->
  <div id="status-bar">
    <div id="status-title">S C O U T</div>
    <div id="status-text">Initializing world model...</div>
    <div id="threat-badge">THREAT: UNKNOWN</div>
  </div>

  <!-- Narration -->
  <div id="narration-box">
    <div id="narration-label">SCOUT NARRATION</div>
    <div id="narration-text"></div>
  </div>

  <!-- Waypoint list -->
  <div id="waypoint-list"></div>

  <!-- Mission panel -->
  <div id="mission-panel">
    <div id="mission-label">MISSION BRIEF</div>
    <div id="mission-row">
      <input
        id="mission-input"
        type="text"
        placeholder="scout for entry points and defensive positions..."
        value="scout for entry points and defensive positions"
      />
      <button id="btn-voice" title="Voice input">&#x1F3A4;</button>
      <button id="btn-scout">SCOUT</button>
    </div>
    <div id="world-row">
      <button class="world-btn active" data-world="space_station">
        SPACE STATION
      </button>
      <button class="world-btn" data-world="jungle_temple">
        JUNGLE TEMPLE
      </button>
      <button class="world-btn" data-world="cyberpunk_rooftop">
        CYBERPUNK ROOF
      </button>
    </div>
  </div>

  <!-- Enter VR -->
  <button id="btn-xr">ENTER XR</button>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-text">Scout is thinking...</div>
  </div>
</div>

<!-- Three.js and SparkJS from CDN -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.178.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.178.0/examples/jsm/",
    "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { VRButton } from 'three/addons/webxr/VRButton.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { SplatMesh } from '@sparkjsdev/spark';

// -- CONFIG --
const BASE_URL = window.location.origin;
const WORLD_SCALE = 4;
const HEADERS = {
  'Content-Type': 'application/json',
  'ngrok-skip-browser-warning': 'true'
};

// -- WORLD DESCRIPTIONS --
const WORLDS = {
  space_station: {
    label: 'Space Station',
    description: 'Abandoned space station interior. Dark corridors with exposed pipes and conduit. Emergency blue lighting casts harsh shadows. Large central hub with four branching corridors heading north, south, east, and west. Debris and equipment scattered across metal grating floor. Structural damage visible on eastern wall with breach showing stars. Zero gravity indicators throughout. Control panels line the walls, most dark and inoperative.',
    splat: '/worlds/space_station.spz',
    collider: '/worlds/space_station_collider.glb',
    bgColor: 0x000814,
    fogColor: 0x000814,
  },
  jungle_temple: {
    label: 'Jungle Temple',
    description: 'Dense jungle temple ruins at dusk. Ancient moss-covered stone walls with carved reliefs, partially collapsed archways. Central courtyard surrounded by four crumbling stone towers at cardinal points. Thick vines and roots covering most surfaces. Low orange-purple light filtering through dense jungle canopy. Stone pathways overgrown with vegetation. A large ceremonial altar at centre, cracked and weathered. Multiple cave-like entrances in temple walls.',
    splat: '/worlds/jungle_temple.spz',
    collider: '/worlds/jungle_temple_collider.glb',
    bgColor: 0x0a0500,
    fogColor: 0x1a0a00,
  },
  cyberpunk_rooftop: {
    label: 'Cyberpunk Rooftop',
    description: 'Futuristic cyberpunk rooftop at night. Rain-slicked concrete surface reflecting neon signs from surrounding megastructures. Ventilation units, satellite dishes, and server cooling towers scattered across surface. Two access stairwells visible on north and south ends. Low concrete barriers and HVAC units provide partial cover. Holographic advertisement billboards on surrounding buildings. City skyline stretches in all directions 40 floors below. Puddles reflect pink and cyan neon light.',
    splat: '/worlds/cyberpunk_rooftop.spz',
    collider: '/worlds/cyberpunk_rooftop_collider.glb',
    bgColor: 0x050008,
    fogColor: 0x0a0015,
  }
};

// -- STATE --
let currentWorld = 'space_station';
let activePins = [];
let scene, camera, renderer;
let isScoutRunning = false;
let colliderMeshes = [];
const gltfLoader = new GLTFLoader();
const downRay = new THREE.Raycaster();
const wallRay = new THREE.Raycaster();

// -- XR CAMERA RIG (dolly) --
let cameraRig;
let xrController0, xrController1;

// -- SCENE SETUP --
function initScene() {
  const canvas = document.getElementById('canvas');

  scene = new THREE.Scene();
  scene.background = new THREE.Color(WORLDS[currentWorld].bgColor);
  scene.fog = null;

  camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    100
  );
  // Position set after rig creation below

  renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: false,
    powerPreference: 'high-performance',
  });
  // PICO has high DPI but weak GPU — cap pixel ratio low
  const isPico = /pico|quest|oculus/i.test(navigator.userAgent);
  renderer.setPixelRatio(isPico ? 0.75 : Math.min(window.devicePixelRatio, 1.5));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.toneMapping = THREE.NoToneMapping;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.shadowMap.enabled = false;
  renderer.xr.enabled = true;
  renderer.xr.setFoveation(1.0);
  renderer.xr.setFramebufferScaleFactor(isPico ? 0.75 : 1.0);

  // Camera rig — XR headset tracking moves camera inside this group
  // Moving the rig moves the player through the world
  cameraRig = new THREE.Group();
  cameraRig.add(camera);
  scene.add(cameraRig);
  cameraRig.position.set(0, 0, 3);
  camera.position.set(0, 1.6, 0); // eye height relative to rig

  // XR Controllers
  xrController0 = renderer.xr.getController(0);
  xrController1 = renderer.xr.getController(1);
  cameraRig.add(xrController0);
  cameraRig.add(xrController1);

  // Visual ray for controllers
  const rayGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(0, 0, -3)
  ]);
  const rayMat = new THREE.LineBasicMaterial({ color: 0x00c8f0, transparent: true, opacity: 0.5 });
  xrController0.add(new THREE.Line(rayGeo.clone(), rayMat));
  xrController1.add(new THREE.Line(rayGeo.clone(), rayMat));

  // Controller squeeze → run Scout mission
  xrController0.addEventListener('squeeze', function() { runScoutMission(); });
  xrController1.addEventListener('squeeze', function() { runScoutMission(); });

  // Controller select → run Scout mission (trigger button)
  xrController0.addEventListener('select', function() { runScoutMission(); });

  // WebXR VR Button
  const vrBtn = VRButton.createButton(renderer);
  vrBtn.style.display = 'none'; // we use our own button
  document.body.appendChild(vrBtn);

  // Our custom XR button
  if (navigator.xr) {
    navigator.xr.isSessionSupported('immersive-vr').then(supported => {
      if (supported) {
        document.getElementById('btn-xr').style.display = 'block';
        document.getElementById('btn-xr').onclick = () => vrBtn.click();
      }
    });
  }

  setupLighting();
  addFloor();
  addEnvironmentSphere();
  addCrosshair();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

// -- LIGHTING --
function setupLighting() {
  // Minimal lighting — splats are self-lit, pins use emissive
  scene.add(new THREE.AmbientLight(0x334466, 2.0));
  const sun = new THREE.DirectionalLight(0xffffff, 1.5);
  sun.position.set(10, 20, 10);
  scene.add(sun);
}

// -- FLOOR --
function addFloor() {
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(200, 200),
    new THREE.MeshBasicMaterial({ visible: false })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = 0;
  scene.add(floor);

  // Grid removed for PICO perf
}

// -- ENVIRONMENT SPHERE --
function addEnvironmentSphere() {
  const geo = new THREE.SphereGeometry(50, 8, 6);
  const mat = new THREE.MeshBasicMaterial({
    color: WORLDS[currentWorld].bgColor,
    side: THREE.BackSide,
  });
  scene.add(new THREE.Mesh(geo, mat));
}

// -- CROSSHAIR --
function addCrosshair() {
  const mat = new THREE.LineBasicMaterial({
    color: 0x00c8f0,
    transparent: true,
    opacity: 0.6
  });

  const h = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-0.01, 0, 0),
    new THREE.Vector3(0.01, 0, 0)
  ]);
  const v = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, -0.01, 0),
    new THREE.Vector3(0, 0.01, 0)
  ]);

  const crosshair = new THREE.Group();
  crosshair.add(new THREE.Line(h, mat));
  crosshair.add(new THREE.Line(v, mat));
  crosshair.position.set(0, 0, -0.5);
  camera.add(crosshair);
}

// -- GAUSSIAN SPLAT LOADING --
let splatLoaded = false;

async function loadWorld(worldKey) {
  const world = WORLDS[worldKey];
  setStatus('Loading ' + world.label + '...');

  scene.background = new THREE.Color(world.bgColor);
  scene.fog = null; // Disabled for PICO performance

  const existing = scene.getObjectByName('splat_world');
  if (existing) scene.remove(existing);
  const existingCollider = scene.getObjectByName('collider_world');
  if (existingCollider) scene.remove(existingCollider);
  colliderMeshes = [];

  clearPins();

  try {
    await loadSplatWorld(world.splat);
  } catch (e) {
    console.warn('Splat loading failed, using placeholder:', e);
    showPlaceholderWorld(worldKey);
  }

  // Load collider mesh
  if (world.collider) {
    try {
      const gltf = await gltfLoader.loadAsync(BASE_URL + world.collider);
      const colliderGroup = gltf.scene;
      colliderGroup.name = 'collider_world';
      colliderGroup.visible = false;
      colliderGroup.traverse(function(child) {
        if (child.isMesh) {
          colliderMeshes.push(child);
        }
      });
      scene.add(colliderGroup);
      console.log('Collider loaded:', colliderMeshes.length, 'meshes');
    } catch (e) {
      console.warn('Collider load failed, using boundary box:', e);
    }
  }

  setStatus(world.label + ' -- Ready');
  currentWorld = worldKey;
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function loadSplatWorld(splatPath) {
  const url = splatPath.startsWith('http')
    ? splatPath
    : BASE_URL + splatPath;

  console.log('Loading splat from:', url);
  const splat = new SplatMesh({ url });
  splat.name = 'splat_world';
  scene.add(splat);
  splatLoaded = true;
  console.log('Splat added to scene');
}

function showPlaceholderWorld(worldKey) {
  const group = new THREE.Group();
  group.name = 'splat_world';

  if (worldKey === 'space_station') {
    buildSpaceStation(group);
  } else if (worldKey === 'jungle_temple') {
    buildJungleTemple(group);
  } else {
    buildCyberpunkRooftop(group);
  }

  scene.add(group);
  setStatus('Demo environment loaded (splat unavailable)');
}

function buildSpaceStation(group) {
  const metal = new THREE.MeshBasicMaterial({ color: 0x223344 });
  const glow = new THREE.MeshBasicMaterial({ color: 0x0066cc });

  // Floor
  group.add(makeMesh(new THREE.BoxGeometry(20, 0.2, 20), metal, 0, -0.1, 0));
  // Ceiling
  group.add(makeMesh(new THREE.BoxGeometry(20, 0.2, 20), metal, 0, 5, 0));
  // Walls
  group.add(makeMesh(new THREE.BoxGeometry(0.3, 5, 20), metal, -10, 2.5, 0));
  group.add(makeMesh(new THREE.BoxGeometry(0.3, 5, 20), metal, 10, 2.5, 0));
  group.add(makeMesh(new THREE.BoxGeometry(20, 5, 0.3), metal, 0, 2.5, -10));
  group.add(makeMesh(new THREE.BoxGeometry(20, 5, 0.3), metal, 0, 2.5, 10));

  // Glowing strips on floor
  for (let i = -8; i <= 8; i += 4) {
    group.add(makeMesh(new THREE.BoxGeometry(0.1, 0.05, 18), glow, i, 0.05, 0));
  }

  // Pillars
  [[-8,-8],[8,-8],[-8,8],[8,8]].forEach(function(pos) {
    group.add(makeMesh(new THREE.CylinderGeometry(0.3, 0.3, 5, 8), metal, pos[0], 2.5, pos[1]));
  });

}

function buildJungleTemple(group) {
  const stone = new THREE.MeshBasicMaterial({ color: 0x3a3228 });
  const moss = new THREE.MeshBasicMaterial({ color: 0x1a3a1a });

  // Temple floor
  group.add(makeMesh(new THREE.BoxGeometry(20, 0.3, 20), stone, 0, -0.15, 0));

  // Central altar
  group.add(makeMesh(new THREE.BoxGeometry(3, 1, 3), stone, 0, 0.5, 0));
  group.add(makeMesh(new THREE.BoxGeometry(2, 0.5, 2), moss, 0, 1.25, 0));

  // Four towers
  [[-8,-8],[8,-8],[-8,8],[8,8]].forEach(function(pos) {
    group.add(makeMesh(new THREE.CylinderGeometry(1.2, 1.5, 8, 8), stone, pos[0], 4, pos[1]));
    group.add(makeMesh(new THREE.ConeGeometry(1.5, 2, 8), moss, pos[0], 9, pos[1]));
  });

  // Archways
  [[0,-8],[0,8],[-8,0],[8,0]].forEach(function(pos) {
    group.add(makeMesh(new THREE.TorusGeometry(1.5, 0.3, 8, 16, Math.PI), stone, pos[0], 3, pos[1]));
  });

}

function buildCyberpunkRooftop(group) {
  const concrete = new THREE.MeshBasicMaterial({ color: 0x1a1a1a });
  const neon = new THREE.MeshBasicMaterial({ color: 0xff00ff });
  const neon2 = new THREE.MeshBasicMaterial({ color: 0x00ffff });

  // Rooftop floor
  group.add(makeMesh(new THREE.BoxGeometry(25, 0.3, 25), concrete, 0, -0.15, 0));

  // HVAC units
  [[-5,0,-5],[5,0,-5],[-5,0,5],[5,0,5],[0,0,-8]].forEach(function(pos) {
    group.add(makeMesh(new THREE.BoxGeometry(2+Math.random(), 1.5+Math.random(), 2+Math.random()),
      concrete, pos[0], 0.9, pos[2]));
  });

  // Neon strips
  for (let i = -10; i <= 10; i += 5) {
    group.add(makeMesh(new THREE.BoxGeometry(0.05, 0.05, 20), neon, i, 0.2, 0));
    group.add(makeMesh(new THREE.BoxGeometry(20, 0.05, 0.05), neon2, 0, 0.2, i));
  }

  // Antenna tower
  group.add(makeMesh(new THREE.CylinderGeometry(0.05, 0.1, 6, 6), concrete, 8, 3, -8));

}

function makeMesh(geo, mat, x, y, z) {
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, y, z);
  m.castShadow = false;
  m.receiveShadow = false;
  return m;
}

// -- WAYPOINT PINS --
function clearPins() {
  activePins.forEach(function(p) { scene.remove(p); });
  activePins = [];
  document.getElementById('waypoint-list').innerHTML = '';
}

function placePins(waypoints) {
  clearPins();

  const colors = { high: 0xff2222, medium: 0xff8800, low: 0x00ff88 };
  const emissives = { high: 0x660000, medium: 0x442200, low: 0x004422 };

  waypoints.forEach(function(wp, i) {
    const color = colors[wp.priority] || 0xffffff;
    const emissive = emissives[wp.priority] || 0x111111;

    const group = new THREE.Group();
    group.name = 'pin_' + wp.id;

    // Glowing sphere — low poly for perf
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(0.18, 8, 8),
      new THREE.MeshBasicMaterial({
        color: color
      })
    );
    group.add(sphere);

    // Vertical pole
    const pole = new THREE.Mesh(
      new THREE.CylinderGeometry(0.02, 0.02, 2, 4),
      new THREE.MeshBasicMaterial({
        color: color,
        transparent: true, opacity: 0.7
      })
    );
    pole.position.set(0, -1, 0);
    group.add(pole);

    // No PointLight per pin — saves GPU on PICO
    const light = null;

    // Position in world
    group.position.set(
      wp.x * WORLD_SCALE,
      1.6,
      wp.z * WORLD_SCALE
    );

    // Store animation data
    group.userData = {
      pulsePhase: i * 1.2,
      baseY: 1.6,
      light: light,
      sphere: sphere,
    };

    scene.add(group);
    activePins.push(group);

    // Animate in with delay
    group.scale.setScalar(0);
    setTimeout(function() { animatePinIn(group); }, i * 250);

    // Add to UI list
    addWaypointToList(wp);

    console.log('[' + wp.priority.toUpperCase() + '] ' + wp.label + ' -> (' + wp.x + ', ' + wp.z + ')');
  });

  document.getElementById('waypoint-list').style.display = 'block';
}

function animatePinIn(pin) {
  const start = Date.now();
  const tick = function() {
    const t = Math.min((Date.now() - start) / 500, 1);
    const s = t < 1
      ? 1 - Math.pow(2, -10*t) * Math.cos(t * Math.PI * 3.5)
      : 1;
    pin.scale.setScalar(s);
    if (t < 1) requestAnimationFrame(tick);
  };
  tick();
}

function addWaypointToList(wp) {
  const list = document.getElementById('waypoint-list');
  const item = document.createElement('div');
  item.className = 'wp-item ' + wp.priority;
  item.innerHTML = '<div class="wp-label">' + wp.label + '</div><div class="wp-note">' + wp.note + '</div>';
  list.appendChild(item);
}

// -- SCOUT MISSION --
async function runScoutMission() {
  if (isScoutRunning) return;
  isScoutRunning = true;

  const mission = document.getElementById('mission-input').value.trim();
  if (!mission) { isScoutRunning = false; return; }

  const world = WORLDS[currentWorld];

  setStatus('Scout is thinking...');
  showLoading(true);
  document.getElementById('btn-scout').disabled = true;
  document.getElementById('narration-box').style.display = 'none';

  try {
    const res = await fetch(BASE_URL + '/api/scout-mission', {
      method: 'POST',
      headers: HEADERS,
      body: JSON.stringify({
        world_description: world.description,
        user_mission: mission
      })
    });

    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    // Place pins
    placePins(data.waypoints);

    // Update UI
    setThreat(data.threat_level);
    setNarration(data.narration);
    setStatus(world.label + ' -- ' + data.waypoints.length + ' targets marked');

    // Speak narration
    await speakText(data.narration);

  } catch (err) {
    console.error('Scout mission error:', err);
    setStatus('Scout offline -- using fallback positions');
    placePins([
      {id:'n',label:'North Zone',x:0,z:-0.7,y:0,priority:'high',note:'Primary area'},
      {id:'e',label:'East Zone',x:0.7,z:0,y:0,priority:'medium',note:'Secondary area'},
      {id:'w',label:'West Zone',x:-0.7,z:0,y:0,priority:'low',note:'Monitor zone'},
    ]);
  } finally {
    showLoading(false);
    document.getElementById('btn-scout').disabled = false;
    isScoutRunning = false;
  }
}

// -- VOICE INPUT (Always-listening with "Scout" wake word) --
let recognition = null;
let alwaysListening = false;

function initVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('btn-voice').style.display = 'none';
    return;
  }

  startAlwaysListening();
}

function startAlwaysListening() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return;

  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  alwaysListening = true;

  recognition.onresult = function(e) {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const transcript = e.results[i][0].transcript.trim().toLowerCase();

      // Show interim results so user knows mic is active
      if (!e.results[i].isFinal) {
        // Check interim for wake word too — faster response
        if (transcript.indexOf('scout') !== -1) {
          document.getElementById('btn-voice').classList.add('listening');
        }
        continue;
      }

      // Final result
      console.log('Heard:', transcript);

      // Check for wake word "scout" anywhere in the phrase
      const scoutIdx = transcript.indexOf('scout');
      if (scoutIdx !== -1) {
        // Extract mission after "scout"
        let mission = transcript.substring(scoutIdx + 5).trim();
        mission = mission.replace(/^[,.\s]+/, '');

        if (mission.length > 2) {
          playBeep(880, 0.15);
          document.getElementById('mission-input').value = mission;
          setStatus('Wake word detected: "' + mission + '"');
          runScoutMission();
          document.getElementById('btn-voice').classList.remove('listening');
        } else {
          playBeep(880, 0.15);
          setStatus('Scout activated -- speak your mission...');
          document.getElementById('btn-voice').classList.add('listening');
          listenForMission();
        }
        return;
      }
    }
  };

  recognition.onerror = function(e) {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    console.warn('Voice error:', e.error);
  };

  recognition.onend = function() {
    // Aggressively restart — continuous mode often silently dies
    if (alwaysListening) {
      try { recognition.start(); } catch(e) {
        setTimeout(function() {
          try { recognition.start(); } catch(e2) {}
        }, 100);
      }
    }
  };

  try { recognition.start(); } catch(e) { /* ignore */ }
  console.log('Always-listening mode active -- say "Scout" to activate');
}

function listenForMission() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return;

  // Stop the always-listening recognition temporarily
  alwaysListening = false;
  try { recognition.stop(); } catch(e) {}

  const missionRec = new SpeechRecognition();
  missionRec.continuous = false;
  missionRec.interimResults = false;
  missionRec.lang = 'en-US';

  missionRec.onresult = function(e) {
    const transcript = e.results[0][0].transcript;
    document.getElementById('mission-input').value = transcript;
    document.getElementById('btn-voice').classList.remove('listening');
    playBeep(440, 0.1);
    runScoutMission();
    // Resume always-listening
    alwaysListening = true;
    startAlwaysListening();
  };

  missionRec.onerror = function() {
    document.getElementById('btn-voice').classList.remove('listening');
    setStatus('Voice error -- type your mission instead');
    alwaysListening = true;
    startAlwaysListening();
  };

  missionRec.onend = function() {
    document.getElementById('btn-voice').classList.remove('listening');
    if (!alwaysListening) {
      alwaysListening = true;
      startAlwaysListening();
    }
  };

  missionRec.start();
}

function playBeep(freq, duration) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = freq;
    gain.gain.value = 0.3;
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch (e) {}
}

// Manual mic button still works as fallback
document.getElementById('btn-voice').onclick = function() {
  playBeep(880, 0.15);
  setStatus('Listening...');
  document.getElementById('btn-voice').classList.add('listening');
  listenForMission();
};

// -- TTS --
async function speakText(text) {
  try {
    const res = await fetch(BASE_URL + '/api/speak', {
      method: 'POST',
      headers: HEADERS,
      body: JSON.stringify({ text: text })
    });

    if (res.status === 204 || !res.ok) {
      browserSpeak(text);
      return;
    }

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.onended = function() { URL.revokeObjectURL(url); };
    await audio.play();

  } catch (e) {
    browserSpeak(text);
  }
}

function browserSpeak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.92;
  u.pitch = 0.85;
  u.volume = 1.0;
  // Pick best available male voice
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(function(v) {
    return v.name.includes('Google UK English Male') ||
      v.name.includes('Daniel') ||
      v.name.includes('Alex') ||
      v.name.includes('Arthur');
  }) || voices.find(function(v) {
    return v.lang.startsWith('en');
  });
  if (preferred) u.voice = preferred;
  window.speechSynthesis.speak(u);
}

// -- UI HELPERS --
function setStatus(text) {
  document.getElementById('status-text').textContent = text;
}

function setThreat(level) {
  const badge = document.getElementById('threat-badge');
  const colors = {
    low: '#00ff88', medium: '#ff8800', high: '#ff3333'
  };
  badge.textContent = 'THREAT: ' + (level || 'UNKNOWN').toUpperCase();
  badge.style.color = colors[level] || '#aaa';
  badge.style.borderColor = colors[level] || '#aaa';
  badge.style.background = (colors[level] || '#333') + '22';
}

function setNarration(text) {
  const box = document.getElementById('narration-box');
  document.getElementById('narration-text').textContent = text;
  box.style.display = 'block';
}

function showLoading(show) {
  document.getElementById('loading').style.display = show ? 'block' : 'none';
}

// -- ANIMATION LOOP --
let lastFPS = Date.now();
let frames = 0;

function animate() {
  renderer.setAnimationLoop(function() {
    const t = Date.now() / 1000;

    // -- XR THUMBSTICK LOCOMOTION --
    if (renderer.xr.isPresenting) {
      const session = renderer.xr.getSession();
      if (session) {
        for (const source of session.inputSources) {
          if (source.gamepad && source.gamepad.axes.length >= 4) {
            // Right thumbstick for movement (axes 2,3), left for turn (axes 0,1)
            const axes = source.gamepad.axes;
            const hand = source.handedness;

            if (hand === 'right' || hand === '') {
              // Forward/back and strafe
              const moveX = Math.abs(axes[2]) > 0.15 ? axes[2] : 0;
              const moveZ = Math.abs(axes[3]) > 0.15 ? axes[3] : 0;
              if (moveX !== 0 || moveZ !== 0) {
                const dir = new THREE.Vector3(moveX, 0, moveZ);
                dir.multiplyScalar(0.05);
                // Apply headset rotation to movement direction
                const headQuat = new THREE.Quaternion();
                camera.getWorldQuaternion(headQuat);
                const headEuler = new THREE.Euler().setFromQuaternion(headQuat, 'YXZ');
                dir.applyEuler(new THREE.Euler(0, headEuler.y, 0));
                cameraRig.position.add(dir);
              }
            }

            if (hand === 'left') {
              // Snap turn
              const turnX = axes[2];
              if (Math.abs(turnX) > 0.7) {
                cameraRig.rotation.y -= turnX * 0.03;
              }
            }
          }
        }
      }
      // Boundary clamp on rig
      const B = 8;
      cameraRig.position.x = Math.max(-B, Math.min(B, cameraRig.position.x));
      cameraRig.position.z = Math.max(-B, Math.min(B, cameraRig.position.z));
    } else {
      // Desktop boundary enforcement
      if (colliderMeshes.length === 0) {
        if (camera.position.y < 1.4) camera.position.y = 1.6;
        if (camera.position.y > 4.0) camera.position.y = 1.6;
        const B = 8;
        camera.position.x = Math.max(-B, Math.min(B, camera.position.x));
        camera.position.z = Math.max(-B, Math.min(B, camera.position.z));
      }
    }

    // Animate pins — just bob, no material updates for perf
    for (let i = 0; i < activePins.length; i++) {
      const pin = activePins[i];
      const ud = pin.userData;
      pin.position.y = ud.baseY + Math.sin(t * 1.5 + ud.pulsePhase) * 0.08;
    }

    // FPS monitor
    frames++;
    if (Date.now() - lastFPS > 3000) {
      const fps = (frames / ((Date.now() - lastFPS) / 1000)).toFixed(0);
      console.log('Scout FPS: ' + fps);
      frames = 0;
      lastFPS = Date.now();
    }

    renderer.render(scene, camera);
  });
}

// -- MOUSE LOOK (desktop) --
function initMouseLook() {
  let isLocked = false;
  const euler = new THREE.Euler(0, 0, 0, 'YXZ');

  document.getElementById('canvas').addEventListener('click', function() {
    if (!isLocked) document.getElementById('canvas').requestPointerLock();
  });

  document.addEventListener('pointerlockchange', function() {
    isLocked = document.pointerLockElement === document.getElementById('canvas');
  });

  document.addEventListener('mousemove', function(e) {
    if (!isLocked) return;
    euler.setFromQuaternion(camera.quaternion);
    euler.y -= e.movementX * 0.002;
    euler.x -= e.movementY * 0.002;
    euler.x = Math.max(-Math.PI/3, Math.min(Math.PI/3, euler.x));
    camera.quaternion.setFromEuler(euler);
  });

  // WASD movement
  const keys = {};
  document.addEventListener('keydown', function(e) { keys[e.code] = true; });
  document.addEventListener('keyup', function(e) { keys[e.code] = false; });

  // Enter key triggers Scout
  document.addEventListener('keydown', function(e) {
    if (e.code === 'Enter' && document.activeElement.id === 'mission-input') {
      runScoutMission();
    }
  });

  setInterval(function() {
    const speed = 0.05;
    const dir = new THREE.Vector3();
    if (keys['KeyW'] || keys['ArrowUp'])    dir.z -= 1;
    if (keys['KeyS'] || keys['ArrowDown'])  dir.z += 1;
    if (keys['KeyA'] || keys['ArrowLeft'])  dir.x -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) dir.x += 1;
    dir.normalize().multiplyScalar(speed);
    dir.applyEuler(new THREE.Euler(0, euler.y, 0));

    if (colliderMeshes.length > 0 && dir.lengthSq() > 0) {
      // Wall collision — cast ray in movement direction
      wallRay.set(camera.position, dir.clone().normalize());
      wallRay.far = 0.5;
      const wallHits = wallRay.intersectObjects(colliderMeshes);
      if (wallHits.length > 0 && wallHits[0].distance < 0.5) {
        // Blocked — don't move
      } else {
        camera.position.add(dir);
      }

      // Floor snap — cast ray downward to find ground
      downRay.set(
        new THREE.Vector3(camera.position.x, camera.position.y + 2, camera.position.z),
        new THREE.Vector3(0, -1, 0)
      );
      downRay.far = 10;
      const floorHits = downRay.intersectObjects(colliderMeshes);
      if (floorHits.length > 0) {
        camera.position.y = floorHits[0].point.y + 1.6;
      }
    } else {
      camera.position.add(dir);
      camera.position.y = 1.6;
      // Boundary fallback
      const BOUND = 8;
      camera.position.x = Math.max(-BOUND, Math.min(BOUND, camera.position.x));
      camera.position.z = Math.max(-BOUND, Math.min(BOUND, camera.position.z));
    }
  }, 16);
}

// -- WORLD BUTTONS --
document.querySelectorAll('.world-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.world-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    loadWorld(btn.dataset.world);
  });
});

// -- SCOUT BUTTON --
document.getElementById('btn-scout').addEventListener('click', runScoutMission);

// -- BOOT --
async function boot() {
  initScene();
  initVoice();
  initMouseLook();
  animate();

  await loadWorld('space_station');

  setStatus('Space Station -- Click canvas to look around, WASD to move');
  setThreat('unknown');

  // Auto-run first Scout mission after 1.5s
  setTimeout(function() {
    document.getElementById('mission-input').value =
      'scout for entry points and defensive positions';
    runScoutMission();
  }, 1500);
}

boot();

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scout — AI Mission Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #scene-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    #scene-container canvas {
      z-index: 1 !important;
    }

    /* -- HUD overlay -- */
    #hud {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 100;
    }

    /* Top status bar */
    #status-bar {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 20, 40, 0.85);
      border: 1px solid #00c8f0;
      border-radius: 8px;
      padding: 10px 24px;
      text-align: center;
      min-width: 320px;
      pointer-events: none;
    }

    #status-title {
      font-size: 18px;
      font-weight: bold;
      color: #00c8f0;
      letter-spacing: 4px;
    }

    #status-text {
      font-size: 12px;
      color: #aaa;
      margin-top: 4px;
    }

    #threat-badge {
      display: inline-block;
      margin-top: 6px;
      padding: 2px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 2px;
      background: #003322;
      color: #00ff88;
      border: 1px solid #00ff88;
    }

    /* Bottom mission panel */
    #mission-panel {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 10, 30, 0.92);
      border: 1px solid #00c8f0;
      border-radius: 12px;
      padding: 16px 20px;
      width: 480px;
      max-width: 90vw;
      pointer-events: all;
    }

    #mission-label {
      font-size: 10px;
      color: #00c8f0;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }

    #mission-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #mission-input {
      flex: 1;
      background: rgba(0, 30, 60, 0.8);
      border: 1px solid #334;
      border-radius: 6px;
      padding: 10px 14px;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    #mission-input:focus {
      border-color: #00c8f0;
    }

    #btn-scout {
      background: #00c8f0;
      color: #000;
      border: none;
      border-radius: 6px;
      padding: 10px 18px;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    #btn-scout:hover { background: #00aed4; }
    #btn-scout:disabled { background: #334; color: #666; cursor: not-allowed; }

    #btn-voice {
      background: transparent;
      border: 1px solid #00c8f0;
      color: #00c8f0;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
    }

    #btn-voice:hover { background: rgba(0,200,240,0.1); }
    #btn-voice.listening {
      background: rgba(255,50,50,0.2);
      border-color: #ff3333;
      color: #ff3333;
      animation: pulse-border 1s infinite;
    }

    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,50,50,0.4); }
      50% { box-shadow: 0 0 0 6px rgba(255,50,50,0); }
    }

    /* World selector */
    #world-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .world-btn {
      flex: 1;
      background: rgba(0,30,60,0.8);
      border: 1px solid #334;
      border-radius: 6px;
      padding: 7px 4px;
      color: #aaa;
      font-size: 10px;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    .world-btn:hover, .world-btn.active {
      border-color: #00c8f0;
      color: #00c8f0;
      background: rgba(0,200,240,0.08);
    }

    /* Narration box */
    #narration-box {
      position: absolute;
      top: 90px;
      left: 20px;
      max-width: 340px;
      background: rgba(0,10,30,0.88);
      border-left: 3px solid #00c8f0;
      border-radius: 0 8px 8px 0;
      padding: 12px 16px;
      font-size: 13px;
      line-height: 1.6;
      color: #ddd;
      display: none;
    }

    #narration-label {
      font-size: 9px;
      color: #00c8f0;
      letter-spacing: 3px;
      margin-bottom: 6px;
    }

    /* Waypoint list */
    #waypoint-list {
      position: absolute;
      top: 90px;
      right: 20px;
      width: 220px;
      display: none;
    }

    .wp-item {
      background: rgba(0,10,30,0.88);
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 6px;
      border-left: 3px solid #666;
      font-size: 11px;
    }

    .wp-item.high   { border-left-color: #ff3333; }
    .wp-item.medium { border-left-color: #ff8800; }
    .wp-item.low    { border-left-color: #00ff88; }

    .wp-label { font-weight: bold; color: #fff; margin-bottom: 2px; }
    .wp-note  { color: #888; font-size: 10px; }

    /* Loading spinner */
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      display: none;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #113;
      border-top-color: #00c8f0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script type="module" crossorigin src="./assets/index-v4I75OSq.js"></script>
</head>
<body>

<div id="scene-container"></div>

<!-- HUD -->
<div id="hud">
  <!-- Status bar -->
  <div id="status-bar">
    <div id="status-title">S C O U T</div>
    <div id="status-text">Initializing world model...</div>
    <div id="threat-badge">THREAT: UNKNOWN</div>
  </div>

  <!-- Narration -->
  <div id="narration-box">
    <div id="narration-label">SCOUT NARRATION</div>
    <div id="narration-text"></div>
  </div>

  <!-- Waypoint list -->
  <div id="waypoint-list"></div>

  <!-- Mission panel -->
  <div id="mission-panel">
    <div id="mission-label">MISSION BRIEF</div>
    <div id="mission-row">
      <input
        id="mission-input"
        type="text"
        placeholder="scout for entry points and defensive positions..."
        value="scout for entry points and defensive positions"
      />
      <button id="btn-voice" title="Voice input">&#x1F3A4;</button>
      <button id="btn-scout">SCOUT</button>
    </div>
    <div id="world-row" style="display:none;">
      <button class="world-btn active" data-world="cyberpunk_rooftop">
        CYBERPUNK ROOF
      </button>
    </div>
  </div>

  <!-- Enter VR button -->
  <button id="btn-enter-vr" style="
    display: none;
    position: absolute;
    bottom: 140px;
    left: 50%;
    transform: translateX(-50%);
    background: #00c8f0;
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 14px 32px;
    font-weight: bold;
    font-size: 16px;
    font-family: 'Courier New', monospace;
    letter-spacing: 3px;
    cursor: pointer;
    pointer-events: all;
    z-index: 200;
  ">ENTER VR</button>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-text">Scout is thinking...</div>
  </div>
</div>

</body>
</html>
